<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub | Login</title>
    <link
      rel="shortcut icon"
      href="assets/img/github-logo.png"
      type="image/x-icon"
    />
    <!-- DaisyUI CDN Start -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- DaisyUI CDN end -->

    <!-- Google Font Start -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <!-- Google Font End -->
    <!-- style sheet -->
    <link rel="stylesheet" href="assets/styles/design.css" />
  </head>
  <body>
    <main
      class="min-h-screen flex items-center justify-center bg-[#F8FAFC] p-8"
    >
      <div class="bg-base-100 py-10 px-4 rounded-xl shadow-2xl w-96">
        <div class="top-part text-center">
          <img
            class="mx-auto w-[60px] mb-4"
            src="assets/img/github-logo.png"
            alt="Github Logo"
          />
          <h2 class="text-xl font-bold">GitHub Issues Tracker</h2>
          <p class="text-[#64748B] my-2">Sign in to manage your issues</p>
        </div>
        <fieldset class="fieldset mx-auto w-xs">
          <label class="label text-neutral font-bold">User Name</label>
          <input id="user-input" type="text" class="input" placeholder="Enter User Name" />

          <label class="label text-neutral font-bold">Password</label>
          <input id="user-pass" type="password" class="input" placeholder="Enter Password" />

          <button id="login-btn" onclick="loginHandler()" type="button" class="btn btn-primary mt-4">Sign In</button>
        </fieldset>
        <div class="flex items-center my-4">
          <div class="flex-grow border-t border-gray-300"></div>
          <span class="px-3 text-gray-500 text-sm font-medium">OR</span>
          <div class="flex-grow border-t border-gray-300"></div>
        </div>
        <div class="bottom-part text-center mt-4">
          Demo Credentials:
          <div class="bg-[#F8FAFC] mt-3 space-y-1">
            <p><span class="font-bold">Username:</span> admin</p>
            <p><span class="font-bold">Password:</span> admin123</p>
          </div>
        </div>
      </div>
    </main>
    <script src="assets/scripts/login.js"></script>
  </body>
</html>
